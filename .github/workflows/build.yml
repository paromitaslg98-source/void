name: Android Build - Stage

on:
  push:
    branches: [ stage ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release-stage:
    if: github.ref == 'refs/heads/stage'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testReleaseUnitTest

      - name: Run Lint Analysis
        run: ./gradlew lintRelease

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Upload Release APK to Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: stage-release-apk
          path: ${{steps.sign_app.outputs.signedReleaseFile}}
          retention-days: 30

      - name: Create Pre-release and Upload APK
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: ${{steps.sign_app.outputs.signedReleaseFile}}
          tag_name: stage-${{ github.run_number }}
          name: "Stage Release Build #${{ github.run_number }}"
          body: |
            🔧 Signed Stage Release (Internal Testing)
            
            - **Commit:** ${{ github.sha }}
            - **Branch:** stage
            - **Build Number:** ${{ github.run_number }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
