name: Android CI/CD Pipeline

on:
  push:
    branches: [ master, stage, develop ]

jobs:

  # ─────────────────────────────────────────────
  # DEVELOP — Unit tests + Lint only
  # ─────────────────────────────────────────────
  build-develop:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests (Integrated)
        run: ./gradlew testIntegratedDebugUnitTest

      - name: Run Unit Tests (Disintegrated)
        run: ./gradlew testDisintegratedDebugUnitTest

      - name: Run Lint Analysis (Integrated)
        run: ./gradlew lintIntegratedDebug

      - name: Run Lint Analysis (Disintegrated)
        run: ./gradlew lintDisintegratedDebug

      - name: Upload Test & Lint Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: develop-reports
          path: "**/build/reports/"
          retention-days: 14

      - name: Document Develop Tests
        if: always()
        run: |
          echo "## Develop Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tested Integrated build (Full features)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tested Disintegrated build (Play Store safe, no ML Kit, no Notification permissions)" >> $GITHUB_STEP_SUMMARY
          echo "Reports are available in the artifacts." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # STAGE — Debug builds → GitHub Pre-release
  # ─────────────────────────────────────────────
  build-stage:
    if: github.ref == 'refs/heads/stage'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: stage-build
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Integrated Debug APK
        run: ./gradlew assembleIntegratedDebug

      - name: Build Disintegrated Debug APK
        run: ./gradlew assembleDisintegratedDebug

      - name: Extract Version from Gradle
        id: version
        run: |
          GRADLE_FILE=$(find . -maxdepth 3 -name "build.gradle.kts" ! -path "./build/*" | head -n 1)
          if [ -z "$GRADLE_FILE" ]; then
            GRADLE_FILE=$(find . -maxdepth 3 -name "build.gradle" ! -path "./build/*" | head -n 1)
          fi
          VERSION=""
          if grep -q -E 'val\s+major\s*=\s*[0-9]+' "$GRADLE_FILE"; then
            MAJOR=$(grep -E 'val\s+major\s*=\s*[0-9]+' "$GRADLE_FILE" | head -1 | grep -o -E '[0-9]+')
            MINOR=$(grep -E 'val\s+minor\s*=\s*[0-9]+' "$GRADLE_FILE" | head -1 | grep -o -E '[0-9]+')
            PATCH=$(grep -E 'val\s+patch\s*=\s*[0-9]+' "$GRADLE_FILE" | head -1 | grep -o -E '[0-9]+')
            BUILD=$(grep -E 'val\s+build\s*=\s*[0-9]+' "$GRADLE_FILE" | head -1 | grep -o -E '[0-9]+')
            VERSION="${MAJOR}.${MINOR}.${PATCH}.${BUILD}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(date +'%Y.%m.%d')
          fi
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline -20 --pretty="- %s (%h)")
          else
            LOG=$(git log --pretty="- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Rename APKs
        id: rename
        run: |
          VERSION="${{ steps.version.outputs.app_version }}"
          
          INT_APK=$(find . -path "*/apk/integrated/debug/*.apk" | head -n 1)
          NEW_INT_NAME="void-integrated-stage-v${VERSION}.apk"
          mv "$INT_APK" "${NEW_INT_NAME}"
          echo "integrated_apk=${NEW_INT_NAME}" >> $GITHUB_OUTPUT
          
          DIS_APK=$(find . -path "*/apk/disintegrated/debug/*.apk" | head -n 1)
          NEW_DIS_NAME="void-disintegrated-stage-v${VERSION}.apk"
          mv "$DIS_APK" "${NEW_DIS_NAME}"
          echo "disintegrated_apk=${NEW_DIS_NAME}" >> $GITHUB_OUTPUT

      - name: Create Pre-release and Upload APKs
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.rename.outputs.integrated_apk }}
            ${{ steps.rename.outputs.disintegrated_apk }}
          tag_name: stage-v${{ steps.version.outputs.app_version }}-${{ github.run_number }}
          name: "Void Launcher v${{ steps.version.outputs.app_version }} (Stage #${{ github.run_number }})"
          body: |
            🔧 **Debug build for internal testing**
            
            ### Included Builds
            - **`void-integrated-stage-v${{ steps.version.outputs.app_version }}.apk`**: Full featured build including ML Kit GenAI capabilities, Widget integrations, and Notification service features.
            - **`void-disintegrated-stage-v${{ steps.version.outputs.app_version }}.apk`**: Play Store compliant build with restricted features entirely omitted.
            
            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # MASTER — Signed Release builds → GitHub Stable Release
  # ─────────────────────────────────────────────
  build-master:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: |
          ./gradlew testIntegratedReleaseUnitTest
          ./gradlew testDisintegratedReleaseUnitTest

      - name: Run Lint Analysis
        run: |
          ./gradlew lintIntegratedRelease
          ./gradlew lintDisintegratedRelease

      - name: Build Integrated Release APK
        run: ./gradlew assembleIntegratedRelease

      - name: Build Disintegrated Release AAB
        run: ./gradlew bundleDisintegratedRelease

      - name: Find Release Build Directories
        id: locate
        run: |
          INT_DIR=$(dirname "$(find . -path "*/apk/integrated/release/*.apk" | head -n 1)")
          DIS_DIR=$(dirname "$(find . -path "*/bundle/disintegratedRelease/*.aab" | head -n 1)")
          echo "int_dir=$INT_DIR" >> $GITHUB_OUTPUT
          echo "dis_dir=$DIS_DIR" >> $GITHUB_OUTPUT

      - name: Sign Integrated APK
        uses: r0adkll/sign-android-release@v1
        id: sign_int
        with:
          releaseDirectory: ${{ steps.locate.outputs.int_dir }}
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Sign Disintegrated AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_dis
        with:
          releaseDirectory: ${{ steps.locate.outputs.dis_dir }}
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Extract Version from Gradle
        id: version
        run: |
          GRADLE_FILE=$(find . -maxdepth 3 -name "build.gradle.kts" ! -path "./build/*" | head -n 1)
          if [ -z "$GRADLE_FILE" ]; then
            GRADLE_FILE=$(find . -maxdepth 3 -name "build.gradle" ! -path "./build/*" | head -n 1)
          fi
          VERSION=""
          if grep -q -E 'val\s+major\s*=\s*[0-9]+' "$GRADLE_FILE"; then
            MAJOR=$(grep -E 'val\s+major\s*=\s*[0-9]+' "$GRADLE_FILE" | head -1 | grep -o -E '[0-9]+')
            MINOR=$(grep -E 'val\s+minor\s*=\s*[0-9]+' "$GRADLE_FILE" | head -1 | grep -o -E '[0-9]+')
            PATCH=$(grep -E 'val\s+patch\s*=\s*[0-9]+' "$GRADLE_FILE" | head -1 | grep -o -E '[0-9]+')
            BUILD=$(grep -E 'val\s+build\s*=\s*[0-9]+' "$GRADLE_FILE" | head -1 | grep -o -E '[0-9]+')
            VERSION="${MAJOR}.${MINOR}.${PATCH}.${BUILD}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(date +'%Y.%m.%d')
          fi
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline -20 --pretty="- %s (%h)")
          else
            LOG=$(git log --pretty="- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Rename Builds
        id: rename
        run: |
          VERSION="${{ steps.version.outputs.app_version }}"
          
          INT_APK="${{ steps.sign_int.outputs.signedReleaseFile }}"
          NEW_INT_NAME="void-integrated-release-v${VERSION}.apk"
          mv "$INT_APK" "${NEW_INT_NAME}"
          echo "integrated_apk=${NEW_INT_NAME}" >> $GITHUB_OUTPUT
          
          DIS_AAB="${{ steps.sign_dis.outputs.signedReleaseFile }}"
          NEW_DIS_NAME="void-disintegrated-release-v${VERSION}.aab"
          mv "$DIS_AAB" "${NEW_DIS_NAME}"
          echo "disintegrated_aab=${NEW_DIS_NAME}" >> $GITHUB_OUTPUT

      - name: Upload Builds to Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: void-release-builds-v${{ steps.version.outputs.app_version }}
          path: |
            ${{ steps.rename.outputs.integrated_apk }}
            ${{ steps.rename.outputs.disintegrated_aab }}
          retention-days: 90

      - name: Create Stable Release and Upload Builds
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.rename.outputs.integrated_apk }}
            ${{ steps.rename.outputs.disintegrated_aab }}
          tag_name: v${{ steps.version.outputs.app_version }}+${{ github.run_number }}
          name: "Void Launcher v${{ steps.version.outputs.app_version }} (Stable Release)"
          body: |
            🚀 **Production Release `v${{ steps.version.outputs.app_version }}`**
            
            ### Included Builds and Intent
            - **`void-integrated-release-v${{ steps.version.outputs.app_version }}.apk`**: 
              *The complete Void Launcher experience.* This build includes advanced ML Kit GenAI notification summaries, the full Widget management screen, and full system notification integrations. Use this version for sideloading the ultimate feature set.
              
            - **`void-disintegrated-release-v${{ steps.version.outputs.app_version }}.aab`**: 
              *The Google Play Store compliant App Bundle.* This build strictly omits all permissions and code requiring `BIND_NOTIFICATION_LISTENER_SERVICE` and App Widgets. It is prepared as an Android App Bundle (.aab) specifically for Play Console release.
            
            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}
            
            ## Installation
            Download your preferred build below. Enable **Install from unknown sources** on your device if installing the APK outside the Play Store. The AAB file is intended for Play Console publishing.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
