name: Android Build - Develop, Stage, Master

on:
  push:
    branches: [ master, stage, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────
  # DEVELOP — Unit tests + lint only
  # ─────────────────────────────────────────────
  test-develop:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Run Lint Analysis
        run: ./gradlew lintDebug

      - name: Upload Test & Lint Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: develop-reports
          path: app/build/reports/
          retention-days: 14

  # ─────────────────────────────────────────────
  # STAGE — Debug build → GitHub Pre-release
  # ─────────────────────────────────────────────
  build-debug-stage:
    if: github.ref == 'refs/heads/stage'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Run Lint Analysis
        run: ./gradlew lintDebug

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK to Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: stage-debug-apk
          path: app/build/outputs/apk/debug/
          retention-days: 30

      - name: Upload Test & Lint Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage-reports
          path: app/build/reports/
          retention-days: 14

      - name: Create Pre-release and Upload Debug APK
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: stage-${{ github.run_number }}
          name: "Stage Debug Build #${{ github.run_number }}"
          body: |
            🔧 Debug APK for internal testing (stage branch)

            - **Commit:** ${{ github.sha }}
            - **Branch:** stage
            - **Build Number:** ${{ github.run_number }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # MASTER — Signed Release build → GitHub Stable Release
  # ─────────────────────────────────────────────
  build-release-master:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testReleaseUnitTest

      - name: Run Lint Analysis
        run: ./gradlew lintRelease

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Build Signed Release APK
        run: ./gradlew assembleRelease
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK to Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: master-release-apk
          path: app/build/outputs/apk/release/
          retention-days: 90

      - name: Upload Test & Lint Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: master-reports
          path: app/build/reports/
          retention-days: 30

      - name: Create Stable Release and Upload APK
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          tag_name: release-${{ github.run_number }}
          name: "Release Build #${{ github.run_number }}"
          body: |
            🚀 Stable release ready for production

            - **Commit:** ${{ github.sha }}
            - **Branch:** master
            - **Build Number:** ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
